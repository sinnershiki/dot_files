########################################
# 基本設定
########################################
# Prefix
set-window-option -g mode-keys emacs
set-option -g prefix C-t
bind-key C-t send-prefix
unbind-key C-b

# マウス操作を有効にする (現在の推奨記法)
set -g mouse on

# Claude Codeのリッチな色表示(シンタックスハイライト等)を有効にするためのTrue Color設定
set-option -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",$TERM:Tc"

# Claude Codeの長い出力に備えてスクロールバック履歴を大幅に増やす
set-option -g history-limit 50000

# 設定の再読み込み (リロード完了メッセージを追加)
bind-key C-r source-file ~/.tmux.conf \; display-message "Reloaded config"

########################################
# Window / Pane の操作
########################################
unbind 1
unbind ^C
unbind &

# 画面分割 (現在のパスを引き継ぐ)
bind-key 1 break-pane
bind-key 2 split-window -v -c "#{pane_current_path}"
bind-key 3 split-window -h -c "#{pane_current_path}"
bind-key c new-window -c "#{pane_current_path}"

# ペインとウィンドウの破棄 (C-kの誤爆防止のため確認プロンプトを追加)
bind-key 0 confirm-before -p "kill-pane #P? (y/n)" kill-pane
bind-key C-k confirm-before -p "kill-window #W? (y/n)" kill-window

# ペイン情報の表示
bind-key i display-panes

########################################
# コピーモード
########################################
set -g default-shell $SHELL
# ※ reattach-to-user-namespace は現在のtmuxでは不要なため削除

bind-key C-Space copy-mode
bind-key t copy-mode
bind-key y paste-buffer
bind-key -T copy-mode M-w send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode C-g send-keys -X cancel

########################################
# 同期と移動
########################################
# pane sync (状態がわかるようにメッセージを追加)
bind-key e set-window-option synchronize-panes on \; display-message "synchronize-panes on"
bind-key E set-window-option synchronize-panes off \; display-message "synchronize-panes off"

# pane movement
bind-key j command-prompt -p "join pane from:"  "join-pane -s '%%'"
bind-key s command-prompt -p "send pane to:"  "join-pane -t '%%'"
